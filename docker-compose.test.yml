services:
  postgres-test:
    image: postgres:17-alpine
    container_name: clinica_ia_test
    environment:
      POSTGRES_USER: psi
      POSTGRES_PASSWORD: psi
      POSTGRES_DB: clinica_ia_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U psi -d clinica_ia_test"]
      interval: 3s
      timeout: 2s
      retries: 10
